<div class="section">
  <h3>设计规则</h3>
  <div class="options" data-multiselect>
    <div class="option" data-choice="dense" onclick="toggleSelect(this)">
      <div class="letter">1</div>
      <div class="content"><h3>工作台密度</h3><p>表格、筛选、状态卡一屏尽量多展示，减少跳转。</p></div>
    </div>
    <div class="option" data-choice="teal" onclick="toggleSelect(this)">
      <div class="letter">2</div>
      <div class="content"><h3>色彩克制</h3><p>主色青绿，强调色琥珀，减少当前紫蓝渐变。</p></div>
    </div>
    <div class="option" data-choice="shell" onclick="toggleSelect(this)">
      <div class="letter">3</div>
      <div class="content"><h3>统一壳层</h3><p>侧栏、顶部上下文栏、页面标题、工具栏统一，业务页只专注内容。</p></div>
    </div>
  </div>
