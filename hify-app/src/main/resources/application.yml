# Hify 应用配置

# 服务配置
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      force: true

# Spring 配置
spring:
  application:
    name: hify

  # ANSI 输出
  output:
    ansi:
      enabled: ALWAYS

  # 数据源配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.59.128:3306/hify?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: appuser
    password: app123456
    hikari:
      pool-name: HifyHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: 192.168.59.128
      port: 6379
      password:
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类包扫描路径
  type-aliases-package: com.hify.**.entity
  # 全局配置
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 逻辑未删除值（未删除）
      logic-not-delete-value: 0
      # 表名前缀
      table-prefix:
      # ID 生成策略
      id-type: auto
  # 配置
  configuration:
    # 日志输出
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # 驼峰命名映射
    map-underscore-to-camel-case: true
    # 缓存开启
    cache-enabled: true

# Resilience4j 熔断器配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

# 日志配置由 logback-spring.xml 统一管理
logging:
  level:
    root: INFO
    com.hify: DEBUG
